<!DOCTYPE html>
<html>
<head>
    <title>30 Day Cyber Job Plan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #58a6ff;
            margin: 0 0 10px 0;
        }
        .progress {
            font-size: 18px;
            font-weight: 600;
            padding: 16px 20px;
            background: linear-gradient(135deg, #1f6feb 0%, #58a6ff 100%);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2);
            text-align: center;
            margin-bottom: 20px;
        }
        .week-folder {
            border: 1px solid #30363d;
            margin: 16px 0;
            border-radius: 12px;
            background: #161b22;
            overflow: hidden;
        }
        .week-folder summary {
            padding: 16px 20px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1c2128;
            list-style: none;
        }
        .week-folder summary::-webkit-details-marker { display: none; }
        .week-folder summary:hover { background: #21262d; }
        .week-progress {
            margin-left: auto;
            font-size: 14px;
            color: #3fb950;
            font-weight: 600;
        }
        .days { padding: 0 10px 10px 10px; }
        .day-folder {
            border: 1px solid #30363d;
            margin: 12px 0;
            border-radius: 8px;
            background: #0d1117;
        }
        .day-folder summary {
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
        }
        .day-folder summary::-webkit-details-marker { display: none; }
        .day-folder summary:hover { background: #161b22; }
        .day-folder.completed summary { color: #3fb950; }
        .day-progress {
            margin-left: auto;
            font-size: 13px;
            color: #8b949e;
        }
        .folder-icon { font-size: 18px; }
        .slots { padding: 8px 16px 16px 16px; }
        .slot {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            border-radius: 6px;
            position: relative;
        }
        .slot:hover { background: #161b22; }
        .slot input {
            position: absolute;
            opacity: 0;
        }
        .checkmark {
            height: 20px;
            width: 20px;
            background-color: #21262d;
            border: 2px solid #30363d;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            position: relative;
        }
        .slot input:checked ~ .checkmark {
            background-color: #3fb950;
            border-color: #3fb950;
        }
        .slot input:checked ~ .checkmark:after {
            content: "";
            position: absolute;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid #000;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }
        .time {
            color: #3fb950;
            font-weight: 600;
            margin-right: 10px;
            min-width: 55px;
            font-size: 14px;
        }
        .slot input:checked ~ .time,
        .slot input:checked ~ span:last-child {
            opacity: 0.6;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>30 Days Cyber Job Plan</h1>
    </div>
    <div class="progress">Days: 0/6 = 0% | Tasks: 2/36 = 5%</div>
    
        <details class="week-folder" open>
          <summary>
            <span class="folder-icon">📂</span>
            Week 1
            <span class="week-progress">Days: 0/6 = 0%</span>
          </summary>
          <div class="days">
            <details class="day-folder ">
              <summary>
                <span class="folder-icon">📁</span>
                Day 1: Setup
                <span class="day-progress">2/6 = 33%</span>
              </summary>
              <div class="slots">
                <label class="slot">
                  <input type="checkbox" checked disabled>
                  <span class="checkmark"></span>
                  <span class="time">06-08</span> Install Git + GitHub. Watch NetworkChuck Git video
                </label>
                
                <label class="slot">
                  <input type="checkbox" checked disabled>
                  <span class="checkmark"></span>
                  <span class="time">08-10</span> Install VirtualBox + Kali Linux ISO. Boot VM
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">10-12</span> CCNA Revise: OSI, TCP/IP, Subnetting. 1-page notes
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">13-15</span> Linux: pwd,ls,cd,mkdir,rm,cp,mv in Kali
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">15-17</span> Create repo network-notes. Push CCNA notes
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">17-18</span> Plan Day 2. Change LinkedIn headline
                </label>
                </div>
            </details>
            
            <details class="day-folder ">
              <summary>
                <span class="folder-icon">📁</span>
                Day 2: Rest + Research
                <span class="day-progress">0/6 = 0%</span>
              </summary>
              <div class="slots">
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">06-08</span> Rest / Sleep in. No screens first 30 min
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">08-10</span> YouTube: 'A Day in Life of SOC Analyst' - take 3 notes
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">10-12</span> Research 3 entry cyber roles: SOC L1, IT Support, NOC
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">13-15</span> Write 5 lines: Why cybersecurity for SOP/LinkedIn
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">15-17</span> Revise Linux: pwd, ls, cd, mkdir, rm, cp, mv - do in Kali
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">17-18</span> Week 1 review: List wins + blockers. Plan Day 3
                </label>
                </div>
            </details>
            
            <details class="day-folder ">
              <summary>
                <span class="folder-icon">📁</span>
                Day 3: Network + Tools
                <span class="day-progress">0/6 = 0%</span>
              </summary>
              <div class="slots">
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">06-08</span> IPv4 vs IPv6, NAT, DHCP
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">08-10</span> Wireshark: capture wifi, find DNS/HTTP
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">10-12</span> Nmap: scan localhost
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">13-15</span> Naukri new profile
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">15-17</span> Resume draft in Docs
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">17-18</span> Apply 2 IT Support jobs
                </label>
                </div>
            </details>
            
            <details class="day-folder ">
              <summary>
                <span class="folder-icon">📁</span>
                Day 4: Linux + CCNA
                <span class="day-progress">0/6 = 0%</span>
              </summary>
              <div class="slots">
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">06-08</span> Linux: users,sudo,chmod,chown
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">08-10</span> CCNA: VLAN,ACL,RIP,OSPF
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">10-12</span> Nmap: scan router -sV
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">13-15</span> Git: nmap-scans repo push
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">15-17</span> LinkedIn About section
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">17-18</span> Apply 3 Network Engineer
                </label>
                </div>
            </details>
            
            <details class="day-folder ">
              <summary>
                <span class="folder-icon">📁</span>
                Day 5: Resume + Project 1
                <span class="day-progress">0/6 = 0%</span>
              </summary>
              <div class="slots">
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">06-08</span> Resume v1 complete
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>

                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">10-12</span> Project 1: Nmap home network map
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">13-15</span> Document IP,MAC,Ports in PDF
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">15-17</span> Push Project 1 + README
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">17-18</span> Apply 3 SOC Intern
                </label>
                </div>
            </details>
            
            <details class="day-folder ">
              <summary>
                <span class="folder-icon">📁</span>
                Day 6: Python + Apply
                <span class="day-progress">0/6 = 0%</span>
              </summary>
              <div class="slots">
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">06-08</span> Python: print,variables,loops on replit
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>

                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">10-12</span> Project 1: Add risks section
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">13-15</span> LinkedIn: Connect 10 SOC people
                </label>
                
                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">15-17</span> Cover letter template

                <label class="slot">
                  <input type="checkbox"  disabled>
                  <span class="checkmark"></span>
                  <span class="time">17-18</span> Apply 5 jobs + Excel track
                </label>
                </div>
            </details>
            </div>
        </details>
        
</body>
</html>
