<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30-Day Cyber Job Plan | Tripti Jain</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --green: #238636;
      --yellow: #d29922;
      --today: #1f6feb;
    }
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 1000px; 
      margin: 0 auto; 
      padding: 20px; 
      background: var(--bg); 
      color: var(--text);
      line-height: 1.6;
    }
    .header {
      text-align: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }
    h1 { color: var(--accent); margin: 0; font-size: 2rem; }
    .subtitle { color: #8b949e; margin-top: 8px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 25px 0;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-num { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
    .stat-label { color: #8b949e; font-size: 0.9rem; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin: 20px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.5s ease;
    }
    h2 { 
      color: var(--accent); 
      margin: 40px 0 20px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .day { 
      background: var(--card);
      border: 1px solid var(--border); 
      padding: 16px; 
      margin: 15px 0; 
      border-radius: 8px;
      transition: transform 0.2s;
    }
    .day:hover { transform: translateY(-2px); }
    .day.today { border-color: var(--today); box-shadow: 0 0 0 1px var(--today); }
    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .day-title { font-weight: 600; font-size: 1.1rem; }
    .day-date { color: #8b949e; font-size: 0.9rem; }
    .today-badge {
      background: var(--today);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-left: 8px;
    }
    .slot { 
      margin: 8px 0; 
      padding-left: 12px;
      border-left: 2px solid var(--border);
    }
    .time { 
      color: var(--green); 
      font-weight: 600; 
      font-family: monospace;
      margin-right: 8px;
    }
    .footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: #8b949e;
      font-size: 0.9rem;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 600px) {
      body { padding: 15px; }
      h1 { font-size: 1.5rem; }
      .day-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>30-Day Cyber Job Plan</h1>
    <div class="subtitle">SOC Analyst L1 → IITD Cyber PhD | 6:00 AM - 6:00 PM IST</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="days-complete">0</div>
      <div class="stat-label">Days Complete</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="days-left">30</div>
      <div class="stat-label">Days Left</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="progress-percent">0%</div>
      <div class="stat-label">Overall Progress</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-bar"></div>
  </div>

  <div id="dashboard">Loading schedule...</div>

  <div class="footer">
    Built by Tripti Jain | <a href="https://github.com/Triptijaincybersec/30-day-cyber-job-plan" target="_blank">View on GitHub</a> | 
    <a href="https://www.linkedin.com/in/" target="_blank">LinkedIn</a>
  </div>

  <script>
    const startDate = new Date('2026-04-25T00:00:00+05:30');
    const today = new Date();

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00+05:30');
      return d.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function isToday(dateStr) {
      const d = new Date(dateStr + 'T00:00:00+05:30');
      return d.toDateString() === today.toDateString();
    }

    function isPast(dateStr) {
      const d = new Date(dateStr + 'T00:00:00+05:30');
      return d < today && !isToday(dateStr);
    }

    fetch('schedule.json')
      .then(r => r.json())
      .then(data => {
        let html = '';
        let totalDays = 0;
        let completedDays = 0;

        data.weeks.forEach(w => {
          html += `<h2>Week ${w.week}: ${w.theme}</h2>`;
          for (const [date, day] of Object.entries(w.days)) {
            totalDays++;
            const past = isPast(date);
            const current = isToday(date);
            if (past) completedDays++;

            html += `<div class="day ${current ? 'today' : ''}">`;
            html += `<div class="day-header">`;
            html += `<div><span class="day-title">${day.title}</span>`;
            if (current) html += `<span class="today-badge">TODAY</span>`;
            html += `</div>`;
            html += `<div class="day-date">${formatDate(date)}</div>`;
            html += `</div>`;

            for (const [time, task] of Object.entries(day.slots)) {
              html += `<div class="slot"><span class="time">${time}:</span>${task}</div>`;
            }
            html += `</div>`;
          }
        });

        document.getElementById('dashboard').innerHTML = html;
        
        // Update stats
        const percent = Math.round((completedDays / 30) * 100);
        document.getElementById('days-complete').textContent = completedDays;
        document.getElementById('days-left').textContent = 30 - completedDays;
        document.getElementById('progress-percent').textContent = percent + '%';
        document.getElementById('progress-bar').style.width = percent + '%';
      })
      .catch(e => {
        document.getElementById('dashboard').innerHTML = 
          '<div class="day">Error loading schedule.json. Make sure the file exists and is valid JSON.</div>';
        console.error(e);
      });
  </script>
</body>
</html>
