<!DOCTYPE html>
<html>
<head>
  <title>30-Day Cyber Plan</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
   .day { border: 1px solid #30363d; padding: 10px; margin: 10px 0; border-radius: 6px; }
   .done { background: #238636; }
    h1, h2 { color: #58a6ff; }
  </style>
</head>
<body>
  <h1>30-Day Cyber Job Plan</h1>
  <div id="dashboard"></div>
  <script>
    fetch('schedule.json')
     .then(r => r.json())
     .then(data => {
        let html = '';
        data.weeks.forEach(w => {
          html += `<h2>Week ${w.week}: ${w.theme}</h2>`;
          for (const [date, day] of Object.entries(w.days)) {
            html += `<div class="day"><b>${date} - ${day.title}</b><br>`;
            for (const [time, task] of Object.entries(day.slots)) {
              html += `${time}: ${task}<br>`;
            }
            html += `</div>`;
          }
        });
        document.getElementById('dashboard').innerHTML = html;
      });
  </script>
</body>
</html>
